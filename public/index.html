<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenRouter Monitor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .card { background: #1f2937; border-radius: 0.75rem; padding: 1rem; }

    /* Tooltip */
    .ti {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: #374151;
      color: #9ca3af;
      font-size: 9px; font-style: italic; font-weight: bold;
      cursor: help;
      margin-left: 4px;
      flex-shrink: 0;
      vertical-align: middle;
    }
    .ti::after {
      content: attr(data-t);
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: #111827;
      border: 1px solid #374151;
      color: #d1d5db;
      font-size: 11px; font-style: normal; font-weight: normal;
      line-height: 1.5;
      padding: 8px 12px;
      border-radius: 8px;
      width: 220px;
      white-space: normal;
      z-index: 1000;
      pointer-events: none;
      box-shadow: 0 4px 16px rgba(0,0,0,0.6);
    }
    .ti:hover::after { display: block; }
    .ti-left::after  { left: 0;   transform: none; }
    .ti-right::after { left: auto; right: 0; transform: none; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen p-4 md:p-6">
  <div class="max-w-5xl mx-auto">

    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
      <div class="flex items-center gap-3">
        <h1 class="text-base font-semibold tracking-tight">🤖 OpenRouter Monitor</h1>
        <a href="https://t.me/monitor_openrouter_bot" target="_blank"
           class="text-xs text-sky-400 hover:text-sky-300 bg-sky-900/40 px-2 py-0.5 rounded-full">
          @monitor_openrouter_bot ↗
        </a>
      </div>
      <div class="flex items-center gap-3 text-xs text-gray-500">
        <span>Updated: <span id="lastUpdated">–</span></span>
        <button onclick="loadAll()" class="text-blue-400 hover:text-blue-300 text-base leading-none">↻</button>
      </div>
    </div>

    <!-- Stat cards -->
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-4">
      <div class="card">
        <p class="text-xs text-gray-400 mb-1 flex items-center">Balance
          <span class="ti ti-left" data-t="Số dư còn lại trong tài khoản OpenRouter. Công thức: Tổng credits đã nạp − Tổng đã sử dụng từ trước đến nay.">i</span>
        </p>
        <p id="statBalance" class="text-2xl font-bold text-emerald-400">–</p>
      </div>
      <div class="card">
        <p class="text-xs text-gray-400 mb-1 flex items-center">Hôm nay
          <span class="ti" data-t="Chi phí API từ 00:00 UTC đến lần kiểm tra gần nhất. Cập nhật theo chu kỳ check (mặc định 10 phút). Requests hiện N/A vì API chỉ trả data ngày đã hoàn thành.">i</span>
        </p>
        <p id="statToday" class="text-2xl font-bold text-sky-400">–</p>
        <p id="statTodayReq" class="text-xs text-gray-500 mt-0.5">– requests</p>
      </div>
      <div class="card">
        <p class="text-xs text-gray-400 mb-1 flex items-center">Tháng này
          <span class="ti" data-t="Phần trăm ngân sách tháng đã dùng. Tính tổng từ ngày 1 đến hôm nay chia cho ngân sách tháng đã cấu hình (MONTHLY_BUDGET).">i</span>
        </p>
        <p id="statMonthly" class="text-2xl font-bold text-amber-400">–</p>
        <p id="statMonthlyDetail" class="text-xs text-gray-500 mt-0.5">–</p>
      </div>
      <div class="card">
        <p class="text-xs text-gray-400 mb-1 flex items-center">Burn rate
          <span class="ti ti-right" data-t="Tốc độ tiêu tiền trung bình mỗi ngày trong tháng này. Công thức: Tổng đã dùng ÷ Số ngày đã qua. Dùng để dự báo chi phí cuối tháng.">i</span>
        </p>
        <p id="statBurn" class="text-2xl font-bold text-orange-400">–</p>
        <p id="statProjected" class="text-xs text-gray-500 mt-0.5">–</p>
      </div>
    </div>

    <!-- Budget progress -->
    <div class="card mb-4">
      <div class="flex justify-between items-center mb-2">
        <span class="text-sm font-medium flex items-center">Ngân sách tháng này
          <span class="ti ti-left" data-t="Thanh tiến trình sử dụng ngân sách. Màu sắc: Xanh = dưới 80% · Vàng = 80–90% · Đỏ = trên 90%. Ngân sách cấu hình qua biến MONTHLY_BUDGET.">i</span>
        </span>
        <span id="budgetLabel" class="text-sm font-mono text-gray-300">–</span>
      </div>
      <div class="relative h-3 bg-gray-700 rounded-full overflow-hidden mb-2">
        <div id="budgetBar" class="h-full rounded-full transition-all duration-700 bg-emerald-500" style="width: 0%;"></div>
      </div>
      <div class="flex justify-between text-xs text-gray-400">
        <span id="budgetProjected" class="flex items-center gap-1">–
          <span class="ti" data-t="Ước tính tổng chi phí đến cuối tháng nếu giữ nguyên burn rate hiện tại. Nếu con số này vượt budget → sẽ nhận cảnh báo.">i</span>
        </span>
        <span id="budgetDaysLeft" class="flex items-center gap-1">
          <span class="ti ti-right" data-t="Số ngày còn lại trước khi hết budget với tốc độ tiêu hiện tại. Công thức: (Budget − Đã dùng) ÷ Burn rate/ngày.">i</span>–
        </span>
      </div>
    </div>

    <!-- Charts row -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
      <div class="card md:col-span-2">
        <h3 class="text-xs text-gray-400 uppercase tracking-wide mb-3 flex items-center">Chi phí theo ngày (30 ngày)
          <span class="ti ti-left" data-t="Chi phí API mỗi ngày trong 30 ngày qua. Màu sắc: Xanh &lt; $1.5 · Vàng $1.5–3 · Đỏ &gt; $3. Hover vào cột để xem số chính xác.">i</span>
        </h3>
        <div style="position: relative; height: 200px;">
          <canvas id="dailyChart"></canvas>
        </div>
      </div>
      <div class="card">
        <h3 class="text-xs text-gray-400 uppercase tracking-wide mb-3 flex items-center">Top Models – 7 ngày
          <span class="ti ti-right" data-t="Top 5 models tốn chi phí nhiều nhất trong 7 ngày qua. Dữ liệu tổng hợp từ top 3 models của mỗi ngày — cần Management Key để có data này.">i</span>
        </h3>
        <div id="modelsList" class="space-y-3"></div>
      </div>
    </div>

    <!-- History table -->
    <div class="card">
      <h3 class="text-xs text-gray-400 uppercase tracking-wide mb-3">Lịch sử tháng này</h3>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="text-xs text-gray-400 border-b border-gray-700">
              <th class="text-left pb-2 font-medium">Ngày</th>
              <th class="text-right pb-2 font-medium">
                <span class="inline-flex items-center justify-end gap-1">Requests
                  <span class="ti ti-right" data-t="Số lượng API request trong ngày. Lấy từ OpenRouter Management Key API — chỉ có data của ngày đã hoàn thành (UTC). Hôm nay luôn N/A.">i</span>
                </span>
              </th>
              <th class="text-right pb-2 font-medium">
                <span class="inline-flex items-center justify-end gap-1">Chi phí
                  <span class="ti ti-right" data-t="Chi phí API trong ngày tính bằng USD. Ngày đã qua: lấy từ API chính xác. Hôm nay (*): tính bằng delta total_usage nên cập nhật mỗi 10 phút.">i</span>
                </span>
              </th>
              <th class="text-right pb-2 font-medium hidden sm:table-cell">
                <span class="inline-flex items-center justify-end gap-1">Top Model
                  <span class="ti ti-right" data-t="Model tốn chi phí nhiều nhất trong ngày đó.">i</span>
                </span>
              </th>
            </tr>
          </thead>
          <tbody id="historyBody" class="divide-y divide-gray-700/40"></tbody>
        </table>
      </div>
    </div>

  </div>

  <script>
    let dailyChart = null;

    function fmt(n, d = 2) {
      return n != null ? '$' + Number(n).toFixed(d) : 'N/A';
    }
    function fmtDate(d) {
      const [, m, day] = d.split('-');
      return `${day}/${m}`;
    }
    function shortModel(m) {
      return m ? (m.split('/')[1] ?? m) : '–';
    }

    async function loadStatus() {
      const data = await fetch('/api/status').then(r => r.json());

      document.getElementById('statBalance').textContent = fmt(data.balance?.remainingBalance);
      document.getElementById('statToday').textContent = fmt(data.today?.cost, 4);
      document.getElementById('statTodayReq').textContent =
        (data.today?.requestCount != null ? data.today.requestCount : 'N/A') + ' requests';

      if (data.monthly) {
        const m = data.monthly;
        document.getElementById('statMonthly').textContent = m.percentage.toFixed(1) + '%';
        document.getElementById('statMonthlyDetail').textContent =
          `$${m.spent.toFixed(2)} / $${m.budget.toFixed(2)}`;
        document.getElementById('statBurn').textContent = fmt(m.burnRatePerDay) + '/d';
        document.getElementById('statProjected').textContent = 'Dự báo: ' + fmt(m.projected);

        const pct = Math.min(m.percentage, 100);
        const bar = document.getElementById('budgetBar');
        bar.style.width = pct + '%';
        bar.style.background = pct >= 90 ? '#ef4444' : pct >= 80 ? '#f59e0b' : '#10b981';

        document.getElementById('budgetLabel').textContent =
          `$${m.spent.toFixed(2)} / $${m.budget.toFixed(2)} · ${m.percentage.toFixed(1)}%`;
        document.getElementById('budgetProjected').textContent = 'Dự báo cuối tháng: ' + fmt(m.projected);
        document.getElementById('budgetDaysLeft').textContent =
          `Còn ~${Math.max(0, Math.floor(m.daysLeft))} ngày trước khi hết budget`;
      }

      if (data.lastUpdated) {
        const d = new Date(data.lastUpdated);
        document.getElementById('lastUpdated').textContent =
          d.toLocaleString('vi-VN', { timeZone: 'UTC', hour12: false }) + ' UTC';
      }
    }

    async function loadHistory() {
      const data = await fetch('/api/history?days=30').then(r => r.json());
      const days = data.days || [];

      // Daily chart
      const labels = days.map(d => fmtDate(d.date));
      const costs = days.map(d => d.cost ?? 0);
      const ctx = document.getElementById('dailyChart').getContext('2d');
      if (dailyChart) dailyChart.destroy();
      dailyChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            data: costs,
            backgroundColor: costs.map(c => c > 3 ? '#ef4444' : c > 1.5 ? '#f59e0b' : '#3b82f6'),
            borderRadius: 4,
            borderSkipped: false,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: { label: ctx => '$' + Number(ctx.raw).toFixed(4) } },
          },
          scales: {
            x: {
              grid: { color: '#111827' },
              ticks: { color: '#6b7280', font: { size: 10 }, maxRotation: 0 },
            },
            y: {
              grid: { color: '#111827' },
              ticks: { color: '#6b7280', font: { size: 10 }, callback: v => '$' + v },
              beginAtZero: true,
            },
          },
        },
      });

      // History table – current month, newest first
      const today = new Date().toISOString().slice(0, 10);
      const currentMonth = today.slice(0, 7);
      const monthDays = days.filter(d => d.date.startsWith(currentMonth)).reverse();
      const tbody = document.getElementById('historyBody');
      tbody.innerHTML = '';
      for (const day of monthDays) {
        const isToday = day.date === today;
        const tr = document.createElement('tr');
        tr.className = isToday ? 'text-sky-400' : '';
        const topModel = shortModel(day.topModels?.[0]?.model);
        tr.innerHTML = `
          <td class="py-1.5 font-mono text-xs">${fmtDate(day.date)}${isToday ? ' <span class="opacity-60">*</span>' : ''}</td>
          <td class="text-right py-1.5 text-gray-300">${day.requestCount ?? 'N/A'}</td>
          <td class="text-right py-1.5 font-mono">${day.cost != null ? '$' + day.cost.toFixed(4) : 'N/A'}</td>
          <td class="text-right py-1.5 text-gray-400 text-xs hidden sm:table-cell">${topModel}</td>
        `;
        tbody.appendChild(tr);
      }
    }

    async function loadModels() {
      const data = await fetch('/api/models').then(r => r.json());
      const models = data.models || [];
      const container = document.getElementById('modelsList');
      if (models.length === 0) {
        container.innerHTML = '<p class="text-gray-500 text-sm">Chưa có dữ liệu</p>';
        return;
      }
      const maxCost = Math.max(...models.map(m => m.cost));
      const colors = ['#3b82f6', '#8b5cf6', '#10b981', '#f59e0b', '#ef4444'];
      container.innerHTML = models.map((m, i) => {
        const pct = (m.cost / maxCost * 100).toFixed(0);
        return `
          <div>
            <div class="flex justify-between text-xs mb-1">
              <span class="text-gray-300 truncate mr-2">${i + 1}. ${shortModel(m.model)}</span>
              <span class="text-gray-400 shrink-0">$${m.cost.toFixed(3)}</span>
            </div>
            <div class="h-1.5 bg-gray-700 rounded-full overflow-hidden">
              <div class="h-full rounded-full" style="width:${pct}%; background:${colors[i] ?? '#6b7280'};"></div>
            </div>
            <p class="text-gray-500 text-xs mt-0.5">${m.requests.toLocaleString()} requests</p>
          </div>
        `;
      }).join('');
    }

    async function loadAll() {
      try {
        await Promise.all([loadStatus(), loadHistory(), loadModels()]);
      } catch (err) {
        console.error('Failed to load:', err);
      }
    }

    loadAll();
    setInterval(loadAll, 60000);
  </script>
</body>
</html>
